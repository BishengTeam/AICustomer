    - data:
        code: "import re\nfrom typing import Dict, List\n\nTOPIC_DEFAULT_CERT = \"\
          H3CNE-RS+\"\n\n\ndef normalize_text(text: str) -> str:\n    return re.sub(r\"\
          \\s+\", \"\", (text or \"\").lower())\n\n\ndef contains_any(text: str, keywords:\
          \ List[str]) -> bool:\n    return any(k in text for k in keywords)\n\n\n\
          def contains_any_normalized(text: str, keywords: List[str]) -> bool:\n \
          \   normalized = normalize_text(text)\n    return any(k in normalized for\
          \ k in keywords)\n\n\ndef is_high_risk_refuse_query(text: str) -> bool:\n\
          \    normalized = normalize_text(text)\n    patterns = [\n        # 承诺通过类\n\
          \        r\"包过|保过|稳过|一次过|一次就过|包通过|保通过\",\n        r\"保证.*过|保证通过\",\n   \
          \     # 试题泄露/押题类\n        r\"押题|押中|预测题|预测.*题|真题|原题|题库|题库答案|泄题|透题\",\n  \
          \      r\"考前密卷|内部题|内部答案\",\n    ]\n    return any(re.search(p, normalized)\
          \ for p in patterns)\n\n\ndef is_value_query(text: str) -> bool:\n    return\
          \ contains_any_normalized(\n        text,\n        [\n            \"还有用吗\"\
          ,\n            \"还有必要考吗\",\n            \"有必要考吗\",\n            \"值不值得考\"\
          ,\n            \"值得考吗\",\n            \"还有必要学吗\",\n            \"有必要学吗\"\
          ,\n            \"还有必要拿吗\",\n            \"有必要拿吗\",\n        ],\n    )\n\n\
          \ndef should_clarify_registration_target(text: str) -> bool:\n    return\
          \ contains_any_normalized(\n        text,\n        [\n            \"这个怎么报名\"\
          ,\n            \"这个怎么报\",\n            \"这个如何报名\",\n            \"这个如何报\"\
          ,\n            \"怎么报名\",\n            \"怎么报\",\n        ],\n    )\n\n\n\
          def extract_cert_name(text: str) -> str:\n    t = (text or \"\").upper()\n\
          \n    if \"H3CNE-RS+\" in t or \"H3CNE RS+\" in t or \"RS+\" in t:\n   \
          \     return \"H3CNE-RS+\"\n    if \"H3CNE\" in t:\n        return \"H3CNE\"\
          \n\n    if contains_any(text, [\"新华三\", \"H3C认证\", \"h3c认证\"]):\n      \
          \  return \"H3C\"\n\n    return \"\"\n\n\ndef extract_question_type(text:\
          \ str) -> str:\n    if is_high_risk_refuse_query(text):\n        return\
          \ \"high_risk_refuse\"\n\n    if is_value_query(text):\n        return \"\
          value\"\n\n    if contains_any(text, [\"考试代码\", \"考什么\", \"考试内容\", \"考哪些\"\
          , \"科目\", \"题型\", \"exam code\", \"examcode\"]):\n        return \"exam\"\
          \n\n    if contains_any(\n        text,\n        [\n            \"适合考哪个证\"\
          ,\n            \"推荐哪个证\",\n            \"考哪个\",\n            \"怎么选认证\",\n\
          \            \"从哪个证书开始\",\n            \"从哪个 H3C 证书开始\",\n            \"\
          从哪个认证开始\",\n            \"从哪个 H3C 认证开始\",\n            \"认证路线\",\n     \
          \       \"路线怎么选\",\n            \"最适合入门\",\n            \"先考 H3CNE 还是别的\"\
          ,\n            \"先考H3CNE还是别的\",\n        ],\n    ):\n        return \"recommendation\"\
          \n\n    if contains_any(\n        text,\n        [\n            \"前置\",\n\
          \            \"报考条件\",\n            \"报名条件\",\n            \"能不能考\",\n \
          \           \"能报吗\",\n            \"我能报吗\",\n            \"我能报名吗\",\n  \
          \          \"能报名吗\",\n            \"零基础\",\n            \"基础要求\",\n    \
          \        \"必须培训\",\n            \"一定要先参加培训\",\n            \"必须先上课\",\n\
          \            \"培训后才能考\",\n            \"培训后才能考试\",\n            \"参加培训才能考\"\
          ,\n            \"先参加培训才能考\",\n            \"不培训能报名\",\n            \"自学后报名\"\
          ,\n            \"可以自学报名\",\n        ],\n    ):\n        return \"prerequisite\"\
          \n\n    if contains_any(\n        text,\n        [\"报名\", \"怎么报\", \"去哪报\"\
          , \"在哪里报\", \"预约考试\", \"考试平台\", \"报名入口\", \"预约平台\", \"在哪个平台预约\", \"约考\"\
          ],\n    ):\n        return \"registration\"\n\n    if contains_any(text,\
          \ [\"成绩\", \"查分\", \"分数\", \"多久出分\", \"成绩查询\"]):\n        return \"score\"\
          \n\n    if contains_any(text, [\"有效期\", \"多久过期\", \"过期\", \"续证\", \"重认证\"\
          , \"刷新有效期\"]):\n        return \"recertification\"\n\n    if contains_any(\n\
          \        text,\n        [\"课程\", \"培训\", \"学什么\", \"学习路径\", \"怎么学\", \"\
          先学啥\", \"主要学\", \"学哪些内容\", \"学习内容\", \"课程内容\", \"主要学什么\"],\n    ):\n   \
          \     return \"training\"\n\n    if contains_any(\n        text,\n     \
          \   [\n            \"领证\",\n            \"拿证\",\n            \"拿证入口\",\n\
          \            \"领证入口\",\n            \"电子证书\",\n            \"下载证书\",\n \
          \           \"证书下载\",\n            \"下载入口\",\n            \"证书发放\",\n  \
          \          \"证书查询\",\n            \"证书领取\",\n            \"领取证书\",\n   \
          \         \"证书怎么领\",\n            \"证书在哪下载\",\n            \"证书去哪里下载\",\n\
          \            \"证书去哪里领\",\n            \"通过后证书\",\n            \"下载电子证书\"\
          ,\n            \"查看证书\",\n        ],\n    ):\n        return \"certificate\"\
          \n\n    if contains_any(\n        text,\n        [\"是什么\", \"是干嘛的\", \"\
          介绍\", \"有啥用\", \"有没有用\", \"适合什么人\", \"适合谁\", \"适合人群\", \"哪些岗位\", \"适合哪些岗位\"\
          , \"什么岗位\", \"在职运维\", \"学生还是在职运维\"],\n    ):\n        return \"intro\"\n\
          \n    return \"unknown\"\n\n\ndef normalize_cert_name(cert_name: str, question_type:\
          \ str) -> str:\n    defaultable_types = {\n        \"intro\",\n        \"\
          prerequisite\",\n        \"training\",\n        \"exam\",\n        \"registration\"\
          ,\n        \"score\",\n        \"certificate\",\n        \"recertification\"\
          ,\n        \"value\",\n    }\n\n    if cert_name == \"H3CNE\":\n       \
          \ return TOPIC_DEFAULT_CERT\n\n    if cert_name == \"\" and question_type\
          \ in defaultable_types:\n        return TOPIC_DEFAULT_CERT\n\n    return\
          \ cert_name\n\n\ndef build_missing_fields(query: str, cert_name: str, question_type:\
          \ str) -> List[str]:\n    missing = []\n\n    if question_type == \"recommendation\"\
          :\n        missing.extend([\"user_background\", \"target_direction\"])\n\
          \    elif question_type == \"value\":\n        missing.append(\"value_dimension\"\
          )\n    elif cert_name == \"\" and question_type == \"prerequisite\":\n \
          \       missing.append(\"cert_name\")\n    elif cert_name == \"\" and question_type\
          \ == \"registration\" and should_clarify_registration_target(query):\n \
          \       missing.append(\"cert_name\")\n    elif question_type == \"unknown\"\
          \ and cert_name == \"\":\n        missing.append(\"cert_name\")\n\n    return\
          \ missing\n\n\ndef build_clarify_text(missing_fields: List[str], question_type:\
          \ str) -> str:\n    if question_type == \"recommendation\":\n        return\
          \ (\n            \"为了更准确给你推荐 H3C 认证，我还需要了解两点：\\n\"\n            \"1. 你现在的基础如何（零基础\
          \ / 有网络基础 / 有项目经验）？\\n\"\n            \"2. 你未来想往哪个方向发展（路由交换 / 安全 / 云计算 /\
          \ 无线）？\"\n        )\n\n    if question_type == \"value\":\n        return\
          \ (\n            \"你这里说的“还有用/还有必要考”，可能是在问两件不同的事：\\n\"\n            \"1.\
          \ 你想问 H3CNE-RS+ 现在值不值得考、对求职或学习有没有帮助；\\n\"\n            \"2. 你想问 H3CNE-RS+\
          \ 证书是否还在有效期内、会不会过期。\\n\"\n            \"你更想了解哪一种？\"\n        )\n\n    field_map\
          \ = {\n        \"cert_name\": \"当前应用主要回答 H3CNE-RS+ 相关问题。如果你想问其他 H3C 认证，请明确认证名称，例如\
          \ H3CSE-RS+。\",\n        \"user_background\": \"请补充你的当前基础情况。\",\n      \
          \  \"target_direction\": \"请补充你想发展的技术方向。\",\n        \"value_dimension\"\
          : \"请补充你更想了解证书价值，还是证书是否仍有效。\",\n    }\n\n    parts = [field_map.get(f, f\"\
          请补充字段：{f}\") for f in missing_fields]\n    return \"\\n\".join(parts) if\
          \ parts else \"请补充更具体的问题信息。\"\n\n\ndef build_retrieval_query(cert_name:\
          \ str, question_type: str, query: str) -> str:\n    boost_map = {\n    \
