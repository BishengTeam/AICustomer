<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 客服</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card chat-shell">
        <header class="chat-header">
          <div>
            <p class="eyebrow">智能问答</p>
            <h1>AI 客服</h1>
            <p class="subtitle">每轮提问和回答都会追加到下方会话区，方便连续查看多轮问答内容。</p>
          </div>
          <button id="clear" type="button" class="ghost-button">清空会话</button>
        </header>

        <section class="conversation-panel" aria-labelledby="conversation-title">
          <div class="panel-head">
            <h2 id="conversation-title">会话记录</h2>
            <span id="turn-count" class="turn-count">0 轮</span>
          </div>

          <div id="conversation" class="conversation" role="log" aria-live="polite" aria-relevant="additions text">
            <div id="empty-state" class="empty-state">
              <strong>等待开始对话</strong>
              <p>发送问题后，这里会按时间顺序展示完整的多轮问答记录。</p>
            </div>
          </div>
        </section>

        <section class="composer-panel">
          <label for="question" class="label">输入问题</label>
          <div class="composer-row">
            <textarea
              id="question"
              rows="3"
              placeholder="请输入你的问题，按 Enter 发送，Shift + Enter 换行"
            ></textarea>
            <button id="send" type="button">发送</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
